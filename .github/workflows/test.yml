name: Integrity Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ledger_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
        ports:
          - 5432:5432
        # CRITICAL: This is how you enable pg_cron in GitHub Services
        options: >-
          --health-cmd "pg_isready -U postgres -d ledger_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          -c shared_preload_libraries=pg_cron
          -c cron.database_name=ledger_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run Migrations
        env:
          PGPASSWORD: password123
        run: |
          # Apply files in alphabetical order (V1 -> V6)
          # We use the 'postgres' user to ensure we have permission to create extensions
          for file in db/migration/V*.sql; do
            echo "Applying $file..."
            psql -h localhost -U postgres -d ledger_db -f "$file" || exit 1
          done

      - name: Execute Integrity Test Suite
        env:
          PGPASSWORD: password123
        run: |
          psql -h localhost -U postgres -d ledger_db -f tests/integrity_suite.sql > test_output.log 2>&1
          cat test_output.log
          
          # Check for success indicators in your specific test script
          if grep -q "PASSED" test_output.log && ! grep -iq "failed" test_output.log; then
            echo "Integrity check successful."
            exit 0
          else
            echo "Integrity check failed. Check the logs."
            exit 1
          fi
