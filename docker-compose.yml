services:
  db:
    image: postgres:18
    container_name: ledger_db
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    command: >
      postgres 
      -c shared_preload_libraries=pg_cron
      -c cron.database_name=ledger_db